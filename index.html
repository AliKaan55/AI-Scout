<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Scout | Transfer Danışmanı</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#d32f2f">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/33/33736.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-danger">⚽ AI-Scout</h1>
            <p class="lead">Yapay Zeka Destekli Futbolcu Analiz Sistemi</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" id="playerName" class="form-control" placeholder="Oyuncu adı girin (Örn: Icardi)">
                            <button class="btn btn-danger" onclick="getAnalysis()">Analiz Et</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="loading" class="text-center mt-4 d-none">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="mt-2">AI verileri analiz ediyor...</p>
        </div>

        <div class="row mt-4 justify-content-center" id="results">
        </div>
    </div>

    <script>
        async function getAnalysis() {
            const name = document.getElementById('playerName').value;
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loading');

            if(!name) return alert("Lütfen bir isim girin!");

            loader.classList.remove('d-none');
            resultsDiv.innerHTML = '';

            try {
                
                const response = await fetch("https://ai-scout-api.onrender.com/api/Scout/analyze/" + name);
                const data = await response.text();

                resultsDiv.innerHTML = `
                    <div class="col-md-8">
                        <div class="card border-0 shadow-lg">
                            <div class="card-header bg-danger text-white fw-bold">${name.toUpperCase()} ANALİZİ</div>
                            <div class="card-body">
                                <p class="card-text" style="white-space: pre-line;">${data}</p>
                            </div>
                        </div>
                    </div>`;
            } catch (error) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">Hata: API'ye ulaşılamadı!</div>`;
            } finally {
                loader.classList.add('d-none');
            }
        }

        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</body>
</html>
